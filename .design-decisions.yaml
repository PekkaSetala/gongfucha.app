# Web Design Decisions — Gongfu Cha
# Generated by web-design-audit on 2026-04-06
# Watch mode validates new code against these decisions.

project: "gongfucha"
last_audit: "2026-04-06"

typography:
  scale_ratio: null  # ad-hoc — consolidation recommended
  base_size: 14px
  fonts:
    display: "Noto Serif SC"
    body: "DM Sans"
  body_line_height: 1.5  # needs explicit enforcement
  heading_line_height: 1.25
  min_label_size: 11px  # 10px found, 11px minimum recommended

color:
  palette_style: "warm earthy neutrals"
  primary_text: "#2C2520"
  secondary_text: "#645747"
  tertiary_text: "#73624F"  # NEEDS darkening to #5F5242 for AA
  accent: "#8C563E"  # clay — NEEDS darkening to #7A4A35 for CTA contrast
  accent_hover: "#7A4A35"
  gold: "#96793A"  # NEEDS darkening to #7D6530 for badge text
  bg: "#F4EFE6"
  surface: "#FAF7F2"
  border: "#E4DBCC"
  contrast_target: "AA"
  semantic:
    error: null  # MISSING — add #9E3B2E
    success: null  # MISSING — add #5A7A4A

spacing:
  base: 4
  horizontal_padding: 20  # px-5, consistent throughout
  scale: [0, 2, 4, 8, 12, 16, 20, 24, 32, 40, 56, 64]

motion:
  default_easing: "cubic-bezier(0.23, 1, 0.32, 1)"  # --ease-out
  ease_in_out: "cubic-bezier(0.77, 0, 0.175, 1)"  # defined, unused
  ease_drawer: "cubic-bezier(0.32, 0.72, 0, 1)"  # defined, unused
  max_ui_duration: 350  # tea-stagger is longest at 350ms
  press_feedback: "scale(0.97) 160ms"
  reduced_motion: true
  hover_gated: true  # behind pointer:fine

radii: [6, 12, 14, 9999]  # pills, controls, cards, circles

shadows:
  levels: 2
  selected: "0 2px 12px rgba(140,86,62,0.1)"
  hover: "0 2px 8px rgba(0,0,0,0.04)"

z_layers:
  base: 0
  paper_texture: 50
  skip_link: 50

framework:
  name: "next"
  version: "16.2.2"
  styling: "tailwind-v4"
  components: "custom"  # no UI library
  state: "react-useState"  # no external state management
